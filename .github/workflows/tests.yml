name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim-bookworm

    steps:
      # python:3.12-slim does not include git; actions/checkout needs it.
      - name: Install git
        run: apt-get update -qq && apt-get install -y --no-install-recommends git

      # Avoid Post Run checkout credential-cleanup git calls that can emit
      # non-fatal exit 128 warnings in containerized jobs.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # python-version omitted — container already provides Python 3.12

      - name: Install dependencies
        run: uv sync
        env:
          UV_LINK_MODE: copy

      - name: Run unit tests (excluding Pebble integration tests)
        run: uv run pytest -v --ignore=tests/test_revocation_pebble.py --ignore=tests/test_integration_pebble.py --ignore=tests/test_lifecycle_pebble.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
