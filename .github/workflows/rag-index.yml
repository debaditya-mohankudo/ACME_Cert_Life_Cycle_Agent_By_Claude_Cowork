name: Update RAG Index

on:
  schedule:
    - cron: "0 1 * * *"   # 1 AM UTC nightly
  workflow_dispatch:        # allow manual trigger

jobs:
  rag-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install sentence-transformers chromadb

      - name: Build RAG index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/rag_indexer.py --pr-limit 100

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rag_index/
          git diff --cached --quiet || git commit -m "chore: update RAG index $(date -u +%Y-%m-%d) [skip ci]"
          git push
