services:
  acme-agent:
    build:
      context: .
      target: production  # security config verified by tests/test_docker_config.py
    ports:
      - "80:80"       # HTTP-01 standalone challenge (temporary during each renewal)
    # Runs as non-root UID 1001 — see doc/README_DOCKER_NONROOT.md
    cap_add:
      - NET_BIND_SERVICE  # Allows non-root UID 1001 to bind port 80
    cap_drop:
      - ALL               # Drop every other Linux capability
    security_opt:
      - no-new-privileges:true
    volumes:
      - acme_data:/data   # Persists certs (CERT_STORE_PATH) + account.key (ACCOUNT_KEY_PATH)
    env_file:
      - .env          # Copy .env.example → .env and fill in your keys and domains
    restart: unless-stopped

volumes:
  acme_data:
